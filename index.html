<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2 Freitas Distribuidoras / Frotas - Gestão de Frota</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React e Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide { animation: slideIn 0.3s ease-out forwards; }
        
        body { 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        
        .active-press:active {
            transform: scale(0.96);
        }

        .password-dots {
            letter-spacing: 0.5em;
            font-family: monospace;
        }

        /* Esconde barra de scroll mas mantém funcionalidade */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                Car: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>,
                Fuel: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="3" y1="22" x2="15" y2="22"/><path d="M4 9h11"/><path d="M14 22V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v18"/><path d="M14 22h1a3 3 0 0 0 3-3V6a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2v13a3 3 0 0 1-3 3h-3"/><path d="M11 7h-4"/><circle cx="9.5" cy="12.5" r="1.5"/></svg>,
                Clipboard: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>,
                History: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>,
                Users: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
                Save: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
                Check: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>,
                X: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
                Lock: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
                Cloud: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.5 19c3.037 0 5.5-2.463 5.5-5.5 0-2.97-2.354-5.382-5.29-5.49A7 7 0 1 0 5 13.09c.005.137.014.273.028.408A4.498 4.498 0 0 0 8 22h9.5z"/></svg>,
                Sun: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>,
                CloudRain: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M16 14v6"/><path d="M8 14v6"/><path d="M12 16v6"/></svg>,
                MapPin: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
                Thermometer: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/></svg>
            };
            return icons[name] || null;
        };

        const weatherCodeMap = (code) => {
            if (code <= 1) return { label: "Céu Limpo", icon: "Sun", color: "text-yellow-500" };
            if (code <= 3) return { label: "Nublado", icon: "Cloud", color: "text-gray-400" };
            if (code <= 65) return { label: "Chuva", icon: "CloudRain", color: "text-blue-400" };
            return { label: "Instável", icon: "Cloud", color: "text-blue-300" };
        };

        const checklistItems = [
            { id: 'oleo', label: 'Óleo do Motor' },
            { id: 'agua', label: 'Água do Radiador' },
            { id: 'pneus', label: 'Pressão dos Pneus' },
            { id: 'cacamba', label: 'Caçamba' },
            { id: 'luzes', label: 'Luzes e Faróis' },
            { id: 'limpeza', label: 'Limpeza Geral' }
        ];

        const initialUsers = [
            { id: 1, name: "Motorista 1", plate: "ABC-1234" },
            { id: 2, name: "Motorista 2", plate: "XYZ-9876" },
            { id: 3, name: "Motorista 3", plate: "DEF-5678" },
            { id: 4, name: "Motorista 4", plate: "GHI-9012" }
        ];

        const ADMIN_PASSWORD = "admin123";

        function App() {
            const [activeTab, setActiveTab] = useState('registro');
            const [historySubTab, setHistorySubTab] = useState('lista'); 
            const [users, setUsers] = useState(() => JSON.parse(localStorage.getItem('frota_users')) || initialUsers);
            const [records, setRecords] = useState(() => JSON.parse(localStorage.getItem('frota_records')) || []);
            const [selectedUserId, setSelectedUserId] = useState(users[0].id);
            const [notification, setNotification] = useState(null);

            // Admin e Clima
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
            const [passInput, setPassInput] = useState('');
            const [weather, setWeather] = useState(null);
            const [loadingWeather, setLoadingWeather] = useState(false);
            const [locationName, setLocationName] = useState("Sua Localização");

            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                odometer: '',
                hadFueling: false,
                fuelType: 'Gasolina',
                prevOdometer: '',
                liters: '',
                totalCost: '',
                checklist: checklistItems.reduce((acc, item) => ({ ...acc, [item.id]: true }), {})
            });

            useEffect(() => { localStorage.setItem('frota_users', JSON.stringify(users)); }, [users]);
            useEffect(() => { localStorage.setItem('frota_records', JSON.stringify(records)); }, [records]);

            useEffect(() => {
                const lastRecord = records
                    .filter(r => r.userId === selectedUserId)
                    .sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime())[0];
                
                setFormData(prev => ({ 
                    ...prev, 
                    prevOdometer: lastRecord ? lastRecord.odometer : '' 
                }));
            }, [selectedUserId, records]);

            const notify = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const fetchWeather = () => {
                setLoadingWeather(true);
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        const { latitude, longitude } = pos.coords;
                        try {
                            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`);
                            const data = await res.json();
                            setWeather(data);
                            
                            // Tenta obter o nome da cidade (reverso geocoding gratuito)
                            const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                            const geoData = await geoRes.json();
                            setLocationName(geoData.address.city || geoData.address.town || geoData.address.suburb || "Cabo Frio");
                        } catch (err) {
                            notify("Erro ao buscar clima", "error");
                        } finally {
                            setLoadingWeather(false);
                        }
                    }, () => {
                        notify("Localização negada", "error");
                        setLoadingWeather(false);
                    });
                }
            };

            const handleChecklistToggle = (id) => {
                setFormData(prev => ({
                    ...prev,
                    checklist: { ...prev.checklist, [id]: !prev.checklist[id] }
                }));
            };

            const handleSave = () => {
                if (!formData.odometer) return notify("Indique o odômetro atual.", "error");
                let stats = { distance: null, kml: null, costPerKm: null };
                if (formData.hadFueling) {
                    const dist = parseFloat(formData.odometer) - (parseFloat(formData.prevOdometer) || 0);
                    if (dist <= 0 && formData.prevOdometer !== '') return notify("KM deve ser maior que anterior.", "error");
                    stats = {
                        distance: Math.max(0, dist),
                        kml: (dist > 0 ? (dist / parseFloat(formData.liters)) : 0).toFixed(2),
                        costPerKm: (dist > 0 ? (parseFloat(formData.totalCost) / dist) : 0).toFixed(2),
                        unit: formData.fuelType === 'GNV' ? 'km/m³' : 'km/L'
                    };
                }
                setRecords([{ id: Date.now(), userId: selectedUserId, ...formData, ...stats }, ...records]);
                notify("Registro guardado!");
                setFormData(prev => ({ ...prev, hadFueling: false, liters: '', totalCost: '', checklist: checklistItems.reduce((acc, item) => ({ ...acc, [item.id]: true }), {}) }));
            };

            const driversSummary = useMemo(() => {
                return users.map(user => {
                    const userRecs = records.filter(r => r.userId === user.id);
                    const totalDistance = userRecs.reduce((acc, r) => acc + (parseFloat(r.distance) || 0), 0);
                    const totalCost = userRecs.reduce((acc, r) => acc + (parseFloat(r.totalCost) || 0), 0);
                    return { ...user, totalDistance, totalCost, recordCount: userRecs.length };
                });
            }, [users, records]);

            return (
                <div className="flex justify-center min-h-screen bg-gray-50 pb-24">
                    <div className="w-full max-w-md bg-white min-h-screen shadow-xl relative overflow-x-hidden flex flex-col">
                        
                        {/* Header */}
                        <header className="sticky top-0 bg-white/90 backdrop-blur-md border-b p-5 flex items-center justify-between z-40">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-2xl">
                                    <Icon name="Car" className="text-white w-5 h-5" />
                                </div>
                                <div>
                                    <h1 className="text-sm font-black text-gray-900">2 Freitas <span className="text-blue-600">Distribuidoras</span></h1>
                                    <p className="text-[8px] font-bold text-gray-400 uppercase tracking-widest">Frotas • Gestão Diária</p>
                                </div>
                            </div>
                        </header>

                        {notification && (
                            <div className="fixed top-24 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl shadow-2xl z-50 text-sm font-bold animate-slide bg-gray-900 text-white border border-gray-800">
                                {notification.msg}
                            </div>
                        )}

                        <main className="p-6 space-y-6 flex-1">
                            {activeTab === 'registro' && (
                                <div className="space-y-6 animate-slide">
                                    <section className="bg-gray-50 p-5 rounded-[2.5rem] border border-gray-100 space-y-4">
                                        <h2 className="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-2">Motorista e Veículo</h2>
                                        <select value={selectedUserId} onChange={e => setSelectedUserId(Number(e.target.value))} className="w-full p-4 bg-white border border-gray-200 rounded-2xl font-bold transition-all text-sm outline-none">
                                            {users.map(u => <option key={u.id} value={u.id}>{u.name} ({u.plate})</option>)}
                                        </select>
                                        <div className="grid grid-cols-2 gap-3">
                                            <input type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="p-4 bg-white border border-gray-200 rounded-2xl text-xs font-medium" />
                                            <input type="number" placeholder="KM Atual" value={formData.odometer} onChange={e => setFormData({...formData, odometer: e.target.value})} className="p-4 bg-white border border-gray-200 rounded-2xl font-black text-blue-600" />
                                        </div>
                                    </section>

                                    <section className="bg-gray-50 p-5 rounded-[2.5rem] border border-gray-100">
                                        <h2 className="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-2 mb-4">Checklist</h2>
                                        <div className="grid grid-cols-1 gap-2">
                                            {checklistItems.map(item => (
                                                <div key={item.id} onClick={() => handleChecklistToggle(item.id)} className="flex items-center justify-between p-4 bg-white rounded-2xl cursor-pointer active-press border border-transparent hover:border-blue-100 transition-all">
                                                    <span className="text-sm font-bold text-gray-700">{item.label}</span>
                                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center transition-colors ${formData.checklist[item.id] ? 'bg-green-100 text-green-600' : 'bg-red-50 text-red-400'}`}>
                                                        <Icon name={formData.checklist[item.id] ? "Check" : "X"} className="w-4 h-4" />
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>

                                    <section className="bg-gray-50 p-5 rounded-[2.5rem] border border-gray-100 space-y-4">
                                        <div className="flex justify-between items-center">
                                            <h2 className="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-2">Abastecimento</h2>
                                            <button onClick={() => setFormData({...formData, hadFueling: !formData.hadFueling})} className={`w-12 h-6 rounded-full transition-all relative ${formData.hadFueling ? 'bg-blue-600' : 'bg-gray-300'}`}>
                                                <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${formData.hadFueling ? 'left-7' : 'left-1'}`} />
                                            </button>
                                        </div>
                                        {formData.hadFueling && (
                                            <div className="space-y-4 animate-slide">
                                                <div className="flex gap-2 p-1 bg-white rounded-2xl border border-gray-100">
                                                    {['Gasolina', 'Etanol', 'GNV'].map(type => (
                                                        <button key={type} onClick={() => setFormData({...formData, fuelType: type})} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-xl transition-all ${formData.fuelType === type ? 'bg-blue-600 text-white' : 'text-gray-400'}`}>{type}</button>
                                                    ))}
                                                </div>
                                                <div className="relative">
                                                    <span className="absolute left-4 top-1/2 -translate-y-1/2 font-black text-gray-400">R$</span>
                                                    <input type="number" placeholder="Custo Total" value={formData.totalCost} onChange={e => setFormData({...formData, totalCost: e.target.value})} className="w-full p-4 pl-12 bg-white border border-gray-200 rounded-2xl font-black outline-none" />
                                                </div>
                                            </div>
                                        )}
                                    </section>

                                    <button onClick={handleSave} className="w-full py-5 bg-blue-600 text-white rounded-[2rem] font-black shadow-2xl shadow-blue-200 flex items-center justify-center gap-2 active-press transition-all">
                                        <Icon name="Save" className="w-5 h-5" /> Salvar Registro
                                    </button>
                                </div>
                            )}

                            {activeTab === 'historico' && (
                                <div className="space-y-4 animate-slide">
                                    <div className="flex justify-between items-center px-2 mb-2">
                                        <h2 className="text-xl font-black">Histórico</h2>
                                        <div className="flex bg-gray-100 p-1 rounded-2xl">
                                            <button onClick={() => setHistorySubTab('lista')} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${historySubTab === 'lista' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-400'}`}>Lista</button>
                                            <button onClick={() => setHistorySubTab('resumo')} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${historySubTab === 'resumo' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-400'}`}>Resumo</button>
                                        </div>
                                    </div>
                                    {historySubTab === 'lista' ? (
                                        records.map(r => {
                                            const u = users.find(u => u.id === r.userId);
                                            return (
                                                <div key={r.id} className="p-5 bg-white border border-gray-100 rounded-3xl shadow-sm space-y-4 animate-slide">
                                                    <div className="flex justify-between items-start">
                                                        <div><p className="font-black text-gray-800 text-sm">{u?.name}</p><p className="text-[9px] font-bold text-gray-400 uppercase">{u?.plate} • {r.date}</p></div>
                                                        <div className="text-right bg-blue-50 px-3 py-1 rounded-full border border-blue-100"><p className="text-[10px] font-black text-blue-600">{r.odometer} km</p></div>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    ) : (
                                        <div className="space-y-4">
                                            {!isAdminAuthenticated ? (
                                                <div className="bg-gray-50 p-8 rounded-[2.5rem] text-center space-y-6">
                                                    <Icon name="Lock" className="w-12 h-12 mx-auto text-blue-600" />
                                                    <h3 className="font-black text-gray-800">Admin Requerido</h3>
                                                    <form onSubmit={handleAdminLogin} className="space-y-3">
                                                        <input type="password" value={passInput} onChange={e => setPassInput(e.target.value)} placeholder="••••••••" className="w-full p-4 bg-white border rounded-2xl text-center font-black password-dots outline-none" />
                                                        <button type="submit" className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black">Entrar</button>
                                                    </form>
                                                </div>
                                            ) : (
                                                driversSummary.map(s => (
                                                    <div key={s.id} className="p-5 bg-white border rounded-3xl space-y-3">
                                                        <p className="font-black text-sm">{s.name}</p>
                                                        <div className="grid grid-cols-2 gap-2 text-[10px]">
                                                            <div className="p-3 bg-gray-50 rounded-2xl">
                                                                <p className="text-gray-400 font-bold uppercase">Km Total</p>
                                                                <p className="font-black text-blue-600">{s.totalDistance} km</p>
                                                            </div>
                                                            <div className="p-3 bg-gray-50 rounded-2xl">
                                                                <p className="text-gray-400 font-bold uppercase">Gasto Total</p>
                                                                <p className="font-black text-green-600">R$ {s.totalCost.toFixed(2)}</p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'previsao' && (
                                <div className="space-y-6 animate-slide">
                                    <section className="bg-gradient-to-br from-blue-600 to-blue-400 p-8 rounded-[2.5rem] text-white shadow-xl shadow-blue-100 relative overflow-hidden">
                                        <div className="relative z-10 space-y-6">
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <h2 className="text-2xl font-black flex items-center gap-2">
                                                        <Icon name="MapPin" className="w-6 h-6 text-blue-100" />
                                                        {locationName}
                                                    </h2>
                                                    <p className="text-blue-100 font-bold opacity-80 uppercase text-[10px] tracking-widest mt-1">Tempo Real</p>
                                                </div>
                                                <button onClick={fetchWeather} className="bg-white/20 p-2 rounded-xl active:rotate-180 transition-all">
                                                    <Icon name="History" className="w-5 h-5" />
                                                </button>
                                            </div>

                                            {weather ? (
                                                <div className="flex items-center justify-between">
                                                    <div>
                                                        <p className="text-6xl font-black tracking-tighter">{Math.round(weather.current_weather.temperature)}°</p>
                                                        <p className="font-black text-blue-100 uppercase text-xs mt-2">{weatherCodeMap(weather.current_weather.weathercode).label}</p>
                                                    </div>
                                                    <Icon name={weatherCodeMap(weather.current_weather.weathercode).icon} className="w-24 h-24 text-white drop-shadow-xl" />
                                                </div>
                                            ) : (
                                                <div className="py-10 text-center">
                                                    {loadingWeather ? <div className="animate-pulse font-black">Buscando Clima...</div> : <button onClick={fetchWeather} className="bg-white text-blue-600 px-6 py-3 rounded-2xl font-black text-sm shadow-xl">Ativar Previsão</button>}
                                                </div>
                                            )}
                                        </div>
                                    </section>

                                    {weather && (
                                        <div className="grid grid-cols-1 gap-3">
                                            <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-4">Próximos Dias</h3>
                                            {weather.daily.time.slice(1, 4).map((time, i) => {
                                                const forecast = weatherCodeMap(weather.daily.weathercode[i+1]);
                                                return (
                                                    <div key={time} className="bg-white p-5 rounded-3xl border border-gray-100 flex items-center justify-between shadow-sm">
                                                        <div className="flex items-center gap-4">
                                                            <div className={`p-2 rounded-2xl bg-gray-50 ${forecast.color}`}><Icon name={forecast.icon} className="w-6 h-6" /></div>
                                                            <div>
                                                                <p className="font-black text-sm">{new Date(time + 'T12:00:00').toLocaleDateString('pt-BR', { weekday: 'long' })}</p>
                                                                <p className="text-[10px] font-bold text-gray-400 uppercase">{forecast.label}</p>
                                                            </div>
                                                        </div>
                                                        <div className="text-right">
                                                            <p className="font-black text-gray-800 text-sm">{Math.round(weather.daily.temperature_2m_max[i+1])}°</p>
                                                            <p className="text-[10px] font-bold text-gray-300">{Math.round(weather.daily.temperature_2m_min[i+1])}°</p>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'equipe' && (
                                <div className="space-y-6 animate-slide">
                                    <h2 className="text-xl font-black">Equipe</h2>
                                    {users.map((u, idx) => (
                                        <div key={u.id} className="p-5 bg-white border border-gray-100 rounded-[2rem] space-y-3">
                                            <input type="text" value={u.name} onChange={e => setUsers(prev => prev.map(usr => usr.id === u.id ? {...usr, name: e.target.value} : usr))} className="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold" />
                                            <input type="text" value={u.plate} onChange={e => setUsers(prev => prev.map(usr => usr.id === u.id ? {...usr, plate: e.target.value.toUpperCase()} : usr))} className="w-full p-4 bg-gray-50 rounded-2xl outline-none font-mono text-xs" />
                                        </div>
                                    ))}
                                </div>
                            )}
                        </main>

                        <nav className="fixed bottom-0 w-full max-w-md bg-white/95 backdrop-blur-lg border-t h-20 flex justify-around items-center px-4 pb-safe z-40">
                            {[
                                { id: 'registro', icon: 'Clipboard', label: 'Registro' },
                                { id: 'historico', icon: 'History', label: 'Histórico' },
                                { id: 'previsao', icon: 'Sun', label: 'Clima' },
                                { id: 'equipe', icon: 'Users', label: 'Equipe' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center gap-1 transition-all ${activeTab === tab.id ? 'text-blue-600 scale-110' : 'text-gray-300'}`}>
                                    <Icon name={tab.icon} className="w-6 h-6" />
                                    <span className="text-[9px] font-black uppercase tracking-tighter">{tab.label}</span>
                                </button>
                            ))}
                        </nav>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
